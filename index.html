<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLens | Professional Analytics</title>
    <!-- Removed the Inter Google Font link to use the default system font -->
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #171717;
            --surface-alt: #262626;
            --text: #ffffff;
            --text-muted: #a3a3a3;
            --accent: #2563eb;
            --border: #262626;
            --radius: 12px;
            --logo-lens: #8ba1b3;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Updated to use the default system/Chrome font stack */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif !important;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-size: 18px;
            transition: 0.3s ease;
            padding-bottom: 40px;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .logo {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--text);
        }
        
        .logo .lens {
            color: var(--logo-lens);
        }

        .theme-toggle {
            position: absolute;
            right: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ── SEARCH AREA (SNAPPED) ── */
        .search-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .search-group {
            max-width: 800px;
            margin: 0 auto;
        }

        .input-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .search-row {
            display: grid;
            grid-template-columns: 1fr 160px;
            gap: 12px;
            height: 56px;
            margin-bottom: 24px;
            align-items: center;
        }

        .search-row:last-child {
            margin-bottom: 0;
        }

        input {
            width: 100%;
            height: 56px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 0 20px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn {
            height: 56px;
            width: 100%;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--surface-alt);
            color: var(--text);
        }

        /* ── DASHBOARD ── */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        .compare-mode .dashboard {
            grid-template-columns: 1fr 1fr;
        }

        .section-label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent);
            margin: 30px 0 12px;
            display: block;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        /* ── PROFILE & RATING (SIZE-LOCKED) ── */
        .profile-box {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
        }

        .handle {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            display: block;
        }

        .rating-card {
            background: var(--surface-alt);
            text-align: center;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px;
            border: 1px dashed var(--accent);
        }

        .rank-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--text);
        }

        .rank-summary {
            font-size: 15px;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 500;
        }

        /* ── STATS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .stat-box {
            background: var(--bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-num {
            display: block;
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
        }

        .stat-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* ── REPO LINKS (MIN-HEIGHT PREVENT COLLAPSE) ── */
        .repo-container {
            min-height: 185px;
        }

        .repo-link {
            display: block;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-weight: 700;
            text-decoration: none;
            font-size: 16px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .repo-link:last-child {
            border-bottom: none;
        }

        .repo-link:hover {
            color: var(--accent);
        }

        /* ── META GRID (STACK & MEMBER SINCE) ── */
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .meta-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .meta-val {
            display: block;
            font-weight: 800;
            color: var(--text);
            font-size: 16px;
        }

        .meta-lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ── BANTER (BOTTOM CENTERED) ── */
        #banter-card {
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            max-width: 800px;
            margin: 48px auto 0;
            font-weight: 600;
            color: var(--accent);
            display: none;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.1);
        }

        #banter-card:hover {
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
            background: rgba(37, 99, 235, 0.12);
        }

        /* ── FOOTER ── */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 30px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 14px;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 800px) {
            .compare-mode .dashboard { grid-template-columns: 1fr; }
            .stats-grid, .meta-grid { grid-template-columns: 1fr 1fr; }
            .search-row { grid-template-columns: 1fr; height: auto; }
            .header { flex-direction: column; }
            .theme-toggle { position: static; margin-top: 20px; }
        }

        /* ── ADDED FOCUS STATE FOR ACCESSIBILITY ── */
        *:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <header class="header" role="banner">
        <div class="logo">Dev<span class="lens">Lens</span></div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme">☀️</button>
    </header>

    <div class="container" role="main">
        <div class="search-card" role="search">
            <div class="search-group">
                
                <div id="analyze-row">
                    <label class="input-label" for="user1">GitHub Username</label>
                    <div class="search-row">
                        <input type="text" id="user1" placeholder=" " autocomplete="off" aria-required="true">
                        <button class="btn btn-primary" onclick="fetchDev('user1', 'view1')" aria-label="Analyze user 1">Analyze →</button>
                    </div>
                </div>

                <div id="compare-ui" style="display: none; margin-top: 20px;" aria-live="polite">
                    <label class="input-label" for="user2">Compare with</label>
                    <div class="search-row">
                        <input type="text" id="user2" placeholder=" " autocomplete="off" aria-required="true">
                        <button class="btn btn-secondary" onclick="fetchDev('user2', 'view2')" aria-label="Compare user 2">Compare</button>
                    </div>
                </div>
                
                <button id="add-btn" class="btn" style="background:none; color:var(--accent); font-size:14px; width:100%; margin-top: 10px;" onclick="enableCompare()" aria-label="Add second developer to compare">
                    + Add Second Developer to Compare
                </button>
            </div>
        </div>

        <div id="main-dashboard" class="dashboard" aria-live="polite">
            <div id="view1" style="display: none;" role="region" aria-label="First Developer Results"></div>
            <div id="view2" style="display: none;" role="region" aria-label="Second Developer Results"></div>
        </div>

        <div id="banter-card" aria-live="polite" role="status"></div>

        <footer class="footer" role="contentinfo">
            <div>Public GitHub API only -no authentication, no data stored.</div>
            <div>Built by Aryan Raj | <a href="#" aria-label="Open Source link">Open Source</a></div>
        </footer>
    </div>

    <script>
        let userData = { v1: null, v2: null };

        function toggleTheme() {
            const h = document.documentElement;
            const btn = document.getElementById('theme-btn');
            const isDark = h.getAttribute('data-theme') === 'dark';
            h.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.textContent = isDark ? '🌙' : '☀️';
            btn.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
        }

        function enableCompare() {
            document.body.classList.add('compare-mode');
            document.getElementById('compare-ui').style.display = 'block';
            document.getElementById('add-btn').style.display = 'none';
        }

        async function fetchDev(inputId, outputId) {
            const name = document.getElementById(inputId).value.trim();
            if (!name) return;

            const out = document.getElementById(outputId);
            out.style.display = 'block';
            out.innerHTML = '<div class="card" role="status">Searching...</div>';

            try {
                const uRes = await fetch(`https://api.github.com/users/${name}`);
                if (!uRes.ok) throw new Error('User not found');
                const user = await uRes.json();

                const rRes = await fetch(`https://api.github.com/users/${name}/repos?per_page=100&sort=stars`);
                const repos = await rRes.json();

                const stars = repos.reduce((a, r) => a + r.stargazers_count, 0);
                const score = (stars * 2) + (user.public_repos * 5) + (user.followers * 10);
                
                const langs = {};
                repos.forEach(r => { if(r.language) langs[r.language] = (langs[r.language] || 0) + 1 });
                const topLang = Object.keys(langs).reduce((a, b) => langs[a] > langs[b] ? a : b, "N/A");
                
                const memberSince = new Date(user.created_at).getFullYear();

                let rank = "Apprentice";
                let summary = `Just starting out with ${topLang}, focusing on the basics.`;
                
                if(score > 100) { rank = "Rising Star"; summary = `Making waves in the ${topLang} scene with growing projects.`; }
                if(score > 500) { rank = "Professional"; summary = `A seasoned ${topLang} builder with a solid public portfolio.`; }
                if(score > 2000) { rank = "Master Elite"; summary = `A heavyweight ${topLang} contributor recognized by the community.`; }

                userData[outputId === 'view1' ? 'v1' : 'v2'] = {
                    name: user.name || user.login,
                    repos: user.public_repos,
                    stars,
                    followers: user.followers
                };

                generateBanter();

                out.innerHTML = `
                    <span class="section-label" role="heading" aria-level="2">Identity</span>
                    <div class="card">
                        <div class="profile-box">
                            <img src="${user.avatar_url}" class="avatar" alt="${user.name || user.login}'s profile avatar">
                            <div>
                                <h2 style="font-weight:800;">${user.name || user.login}</h2>
                                <a href="${user.html_url}" target="_blank" rel="noopener noreferrer" class="handle" aria-label="Visit ${user.login}'s GitHub Profile">@${user.login}</a>
                                <p style="font-size:14px; color:var(--text-muted); margin-top:5px;">${user.bio || 'No bio provided.'}</p>
                            </div>
                        </div>
                    </div>

                    <span class="section-label" role="heading" aria-level="2">Developer Rating</span>
                    <div class="card rating-card">
                        <div class="rank-title">${rank}</div>
                        <div class="rank-summary">${rank}: ${summary}</div>
                    </div>

                    <span class="section-label" role="heading" aria-level="2">Stats Overview</span>
                    <div class="stats-grid card">
                        <div class="stat-box"><span class="stat-num">${user.public_repos}</span><span class="stat-lbl">Repos</span></div>
                        <div class="stat-box"><span class="stat-num">${user.followers}</span><span class="stat-lbl">Followers</span></div>
                        <div class="stat-box"><span class="stat-num">${user.following}</span><span class="stat-lbl">Following</span></div>
                        <div class="stat-box"><span class="stat-num">${stars}</span><span class="stat-lbl">Stars</span></div>
                    </div>

                    <span class="section-label" role="heading" aria-level="2">Top Repositories</span>
                    <div class="card repo-container">
                        ${repos.slice(0, 3).map(r => `
                            <a href="${r.html_url}" target="_blank" rel="noopener noreferrer" class="repo-link" aria-label="View repository ${r.name}">${r.name}</a>
                        `).join('') || '<p style="color:var(--text-muted); font-size:14px; padding-top:10px;" role="status">No public repositories found.</p>'}
                    </div>

                    <div class="meta-grid">
                        <div class="meta-box">
                            <span class="meta-val">${topLang}</span>
                            <span class="meta-lbl">Primary Stack</span>
                        </div>
                        <div class="meta-box">
                            <span class="meta-val">${memberSince}</span>
                            <span class="meta-lbl">Member Since</span>
                        </div>
                    </div>
                `;
            } catch (e) {
                out.innerHTML = `<div class="card" style="color:#ef4444;" role="alert">${e.message}</div>`;
            }
        }

        function generateBanter() {
            const b1 = userData.v1;
            const b2 = userData.v2;
            if (!b1 || !b2) return;

            const banterEl = document.getElementById('banter-card');
            banterEl.style.display = 'block';

            if (b1.repos > b2.repos) {
                banterEl.textContent = `⚡ ${b1.name} is currently out-coding ${b2.name} in repo volume—time to push some code!`;
            } else if (b2.repos > b1.repos) {
                banterEl.textContent = `⚡ Looks like ${b2.name} has been busier in the terminal than ${b1.name} lately!`;
            } else if (b1.stars > b2.stars) {
                banterEl.textContent = `⚡ ${b1.name}'s code is catching more eyes (stars) than ${b2.name}'s right now.`;
            } else {
                banterEl.textContent = `⚡ It's a close race between ${b1.name} and ${b2.name}. Who will ship next?`;
            }
        }
    </script>
</body>
</html>
